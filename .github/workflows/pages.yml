name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dreamwalker-web/package-lock.json
      - name: Install Dynamic Map Viewer dependencies
        run: npm ci
        working-directory: apps/dreamwalker-web
      - name: Build Dynamic Map Viewer demo
        run: npm run build
        working-directory: apps/dreamwalker-web
        env:
          DREAMWALKER_BASE: /gs-mapper/dreamwalker/
          DREAMWALKER_OUT_DIR: ../../docs/dreamwalker
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v5
